folders:
  - /path/to/your/documents

mem0_url: http://localhost:8000
user_id: document_ingest
poll_interval_minutes: 60
chunk_size_tokens: 1000
chunk_overlap_tokens: 100
ocr_enabled: true
supported_extensions:
  - .txt
  - .md
  - .pdf
  - .docx
  - .xlsx
  - .csv
  - .png
  - .jpg
  - .jpeg
  - .tiff
  - .bmp
